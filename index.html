<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>Travel Globe</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#05060f" />
<!-- iOS: run full-screen as a home-screen app -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Travel Globe" />
<link rel="apple-touch-icon" href="icons/icon-180.png" />
<link rel="icon" href="icons/icon-192.png" />
<style>
  :root {
    --accent: #ffcf6b;
    --visited: #ff7a5c;
    --wish: #4fd1c5;
    --panel-bg: rgba(14, 18, 34, 0.72);
    --text: #e8ecf8;
    --muted: #9aa3c4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #05060f;
    color: var(--text);
    font-family: "Segoe UI", system-ui, sans-serif;
    overflow: hidden;
  }
  #globeViz { position: fixed; inset: 0; }

  .space-bg {
    position: fixed; inset: 0; z-index: -1;
    background: radial-gradient(ellipse at 30% 20%, #1a1f45 0%, #0a0c1f 45%, #03040c 100%);
  }

  .panel {
    position: fixed;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    background: var(--panel-bg);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }

  #header {
    top: calc(64px + env(safe-area-inset-top)); left: 18px;
    padding: 13px 15px;
    width: 200px;
  }
  #header.hidden { display: none; }
  #header h1 {
    font-size: 15px; font-weight: 700; letter-spacing: 0.3px;
    display: flex; align-items: center; gap: 6px;
  }
  #header h1 .dot { color: var(--accent); }
  #header p { margin-top: 5px; font-size: 11px; color: var(--muted); line-height: 1.5; }

  .stats { margin-top: 12px; display: flex; gap: 10px; }
  .stat { flex: 1; }
  .stat .num { font-size: 22px; font-weight: 800; line-height: 1; }
  .stat .num.v { color: var(--visited); }
  .stat .num.w { color: var(--wish); }
  .stat .lbl { font-size: 10px; color: var(--muted); margin-top: 3px; }

  /* Mode selector */
  .modes { margin-top: 13px; }
  .modes .ml { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .mode-btn {
    width: 100%; padding: 8px 10px; margin-bottom: 6px; cursor: pointer;
    border-radius: 10px; border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.05); color: var(--text);
    font-size: 12px; display: flex; align-items: center; gap: 8px;
    transition: all .18s;
  }
  .mode-btn .swatch { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

  /* Show/hide toggle */
  #togglePanel {
    top: calc(18px + env(safe-area-inset-top)); left: 18px; padding: 8px 14px;
    font-size: 12px; cursor: pointer; color: var(--text);
    display: flex; align-items: center; gap: 7px;
  }
  #togglePanel:hover { background: rgba(255,255,255,0.12); }
  #togglePanel .dot { color: var(--accent); }
  .mode-btn.v .swatch { background: var(--visited); }
  .mode-btn.w .swatch { background: var(--wish); }
  .mode-btn.active { border-color: currentColor; background: rgba(255,255,255,0.12); font-weight: 700; }
  .mode-btn.v.active { box-shadow: inset 0 0 0 1px var(--visited); }
  .mode-btn.w.active { box-shadow: inset 0 0 0 1px var(--wish); }
  .mode-btn .hintkey { margin-left: auto; font-size: 10px; color: var(--muted); }

  .row { display: flex; gap: 8px; margin-top: 14px; }
  .btn {
    flex: 1; padding: 9px; font-size: 12px; cursor: pointer;
    border-radius: 10px; border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.06); color: var(--text);
    transition: background .2s;
  }
  .btn:hover { background: rgba(255,255,255,0.14); }
  .btn.active { background: var(--accent); color: #1a1300; border-color: var(--accent); font-weight: 700; }

  #hint {
    bottom: calc(22px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
    padding: 10px 18px; font-size: 12px; color: var(--muted);
    border-radius: 99px; white-space: nowrap;
  }
  #hint b { color: var(--text); }

  .tip {
    font-size: 13px; padding: 4px 8px; border-radius: 6px;
    background: rgba(0,0,0,0.78); color: #fff;
  }

  #loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px; z-index: 10; color: var(--muted); font-size: 14px;
  }
  .spinner {
    width: 34px; height: 34px; border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.15); border-top-color: var(--accent);
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="space-bg"></div>
  <div id="globeViz"></div>

  <div id="loading"><div class="spinner"></div><div>Loading globe…</div></div>

  <button id="togglePanel" class="panel"><span class="dot">✦</span> <span id="toggleLabel">Hide panel</span></button>

  <div id="header" class="panel">
    <h1><span class="dot">✦</span> Travel Globe</h1>
    <p>Pick a mode, then click a country on the globe to mark it.</p>

    <div class="stats">
      <div class="stat"><div class="num v" id="countV">0</div><div class="lbl">Visited</div></div>
      <div class="stat"><div class="num w" id="countW">0</div><div class="lbl">Want to go</div></div>
    </div>

    <div class="modes">
      <div class="ml">Click mode</div>
      <button class="mode-btn v active" data-mode="visited">
        <span class="swatch"></span> Visited
      </button>
      <button class="mode-btn w" data-mode="wish">
        <span class="swatch"></span> Want to visit
      </button>
    </div>

    <button class="btn" id="shareBtn" style="width:100%;margin-top:13px;">⤴ Share my map</button>
  </div>

  <div id="hint" class="panel">
    Click a country to mark it as <b>Visited</b> or <b>Want to visit</b>. Click again to clear.
  </div>

<script src="assets/three.min.js"></script>
<script src="assets/globe.gl.min.js"></script>
<script>
const STORAGE_KEY = 'travelGlobe.data';
// state per country: 'visited' | 'wish' | undefined
let state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
let mode = 'visited';
let countries = [];

const COLORS = {
  visited: '#ff7a5c',
  wish:    '#4fd1c5',
  base:    'rgba(255,255,255,0.04)',
  hover:   'rgba(255,255,255,0.35)',
};

// ISO_A3 is "-99" for several countries in this dataset (Norway, France,
// Kosovo, etc.), which would make them collide. Fall back to the unique
// ADMIN name whenever the ISO code is missing or invalid.
const idOf = f => {
  const iso = f.properties.ISO_A3;
  return (iso && iso !== '-99') ? iso : (f.properties.ADMIN || f.properties.NAME);
};
const nameOf = f => f.properties.ADMIN || f.properties.NAME || idOf(f);

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

function capColor(f, hover) {
  const s = state[idOf(f)];
  if (f === hover && !s) return COLORS.hover;
  if (s === 'visited') return COLORS.visited;
  if (s === 'wish') return COLORS.wish;
  return COLORS.base;
}

function updateStats() {
  const vals = Object.values(state);
  document.getElementById('countV').textContent = vals.filter(v => v === 'visited').length;
  document.getElementById('countW').textContent = vals.filter(v => v === 'wish').length;
}

const world = Globe({ rendererConfig: { preserveDrawingBuffer: true, antialias: true } })
  (document.getElementById('globeViz'))
  .backgroundColor('rgba(0,0,0,0)')
  .showAtmosphere(true)
  .atmosphereColor('#5b8cff')
  .atmosphereAltitude(0.18)
  .globeImageUrl('assets/earth-day.jpg')
  .polygonAltitude(0.01)                       // flat — no pop-out
  .polygonCapColor(f => capColor(f, null))
  .polygonSideColor(() => 'rgba(0,0,0,0)')
  .polygonStrokeColor(() => 'rgba(255,255,255,0.35)')
  .polygonLabel(f => {
    const s = state[idOf(f)];
    const tag = s === 'visited' ? ' ✓ Visited' : s === 'wish' ? ' ★ Want to visit' : '';
    return `<div class="tip">${nameOf(f)}${tag}</div>`;
  })
  .onPolygonClick(toggle)
  .onPolygonHover(hover => world.polygonCapColor(f => capColor(f, hover)));

function refreshColors() { world.polygonCapColor(f => capColor(f, null)); }

function toggle(feat) {
  const id = idOf(feat);
  if (state[id] === mode) delete state[id];   // same mode -> clear
  else state[id] = mode;                       // set / switch to current mode
  save(); refreshColors(); updateStats();
  haptic();
}

// Haptic feedback. Uses the Web Vibration API in the browser.
// In the Capacitor build, replace the body with:
//   import { Haptics, ImpactStyle } from '@capacitor/haptics';
//   Haptics.impact({ style: ImpactStyle.Light });
function haptic() {
  if (navigator.vibrate) navigator.vibrate(12);
}

// Brighten the globe so land/borders read well on phone screens.
function brightenLighting() {
  const scene = world.scene();
  // strong ambient so the whole globe shows its texture evenly (no dark night side),
  // plus a soft directional light for a gentle sense of depth.
  scene.add(new THREE.AmbientLight(0xffffff, 2.2));
  const dir = new THREE.DirectionalLight(0xffffff, 0.5);
  dir.position.set(1, 0.6, 1);
  scene.add(dir);
}

// stars
function addStars() {
  const scene = world.scene();
  const g = new THREE.BufferGeometry();
  const n = 1800, pos = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    const r = 800 + Math.random() * 1200;
    const t = Math.random() * Math.PI * 2, p = Math.acos(2 * Math.random() - 1);
    pos[i*3]   = r * Math.sin(p) * Math.cos(t);
    pos[i*3+1] = r * Math.sin(p) * Math.sin(t);
    pos[i*3+2] = r * Math.cos(p);
  }
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(g, new THREE.PointsMaterial({
    color: 0xffffff, size: 1.6, sizeAttenuation: true, transparent: true, opacity: 0.85
  })));
}

fetch('assets/countries.geojson')
  .then(r => r.json())
  .then(geo => {
    countries = geo.features.filter(f => idOf(f) !== 'ATA');
    world.polygonsData(countries);
    brightenLighting();
    addStars();
    updateStats();
    document.getElementById('loading').style.display = 'none';
    world.controls().enableDamping = true;
    world.pointOfView({ lat: 20, lng: 140, altitude: 2.4 });
  })
  .catch(err => {
    document.getElementById('loading').innerHTML =
      '<div style="text-align:center">Failed to load. Please check your internet connection.</div>';
    console.error(err);
  });

// mode buttons
document.querySelectorAll('.mode-btn').forEach(b => {
  b.addEventListener('click', () => {
    mode = b.dataset.mode;
    document.querySelectorAll('.mode-btn').forEach(x => x.classList.toggle('active', x === b));
  });
});

// ===== Share / save the current map as an image =====
// Web build: composes the globe canvas + a caption, then uses the Web Share
// API (with a download fallback). Capacitor build: swap the share/download
// block for @capacitor/share + @capacitor/filesystem.
function buildMapImage() {
  const src = world.renderer().domElement;   // WebGL canvas (preserveDrawingBuffer)
  const w = src.width, h = src.height;
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');

  // space background + globe
  ctx.fillStyle = '#05060f';
  ctx.fillRect(0, 0, w, h);
  ctx.drawImage(src, 0, 0, w, h);

  // caption bar
  const s = w / 800;                          // scale relative to design width
  const v = Object.values(state).filter(x => x === 'visited').length;
  const wsh = Object.values(state).filter(x => x === 'wish').length;
  const barH = 92 * s;
  ctx.fillStyle = 'rgba(5,6,15,0.78)';
  ctx.fillRect(0, h - barH, w, barH);
  ctx.textBaseline = 'middle';

  ctx.fillStyle = '#ffcf6b';
  ctx.font = `700 ${26 * s}px "Segoe UI", system-ui, sans-serif`;
  ctx.fillText('✦ Travel Globe', 28 * s, h - barH / 2);

  ctx.font = `600 ${20 * s}px "Segoe UI", system-ui, sans-serif`;
  const txt = `${v} visited`, txt2 = `${wsh} want to go`;
  ctx.textAlign = 'right';
  ctx.fillStyle = '#ff7a5c';
  ctx.fillText(txt, w - 28 * s, h - barH / 2 - 13 * s);
  ctx.fillStyle = '#4fd1c5';
  ctx.fillText(txt2, w - 28 * s, h - barH / 2 + 13 * s);
  ctx.textAlign = 'left';

  return c;
}

async function shareMap() {
  const canvas = buildMapImage();
  canvas.toBlob(async (blob) => {
    if (!blob) return;
    const file = new File([blob], 'travel-globe.png', { type: 'image/png' });
    try {
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: 'My Travel Globe' });
        return;
      }
    } catch (e) { if (e.name === 'AbortError') return; }
    // fallback: download
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'travel-globe.png';
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 2000);
  }, 'image/png');
}
document.getElementById('shareBtn').addEventListener('click', shareMap);

const headerEl = document.getElementById('header');
const toggleLabel = document.getElementById('toggleLabel');
document.getElementById('togglePanel').addEventListener('click', () => {
  const hidden = headerEl.classList.toggle('hidden');
  toggleLabel.textContent = hidden ? 'Show panel' : 'Hide panel';
});

window.addEventListener('resize', () => {
  world.width(window.innerWidth).height(window.innerHeight);
});

// Register service worker for offline / installable PWA support.
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW failed', err));
  });
}
</script>
</body>
</html>
